<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Gallery</h1>
    <p>Welcome to our Gallery!</p>
    <section class="gallery">
        <div class="gallery-item">
            <img src="Images/Chicken-Biryani.jpg" alt="Chicken Biryani">
            <p>Delicious Chicken Biryani</p>
        </div>
        <div class="gallery-item">
            <img src="Images/Chocolate_cake.jpg" alt="Chocolate Cake">
            <p>Chocolate Cake</p>
        </div>
        <div class="gallery-item">
            <img src="Images/pasta.avif" alt="Pasta">
            <p>Pasta Dish</p>
        </div>
        <div class="gallery-item">
            <img src="Images/Restaurant1.jpg" alt="Restaurant Interior">
            <p>Restaurant Interior</p>
        </div>
        <div class="gallery-item">
            <img src="Images/RestaurantEntrance.jpg" alt="Restaurant Entrance">
            <p>Restaurant Entrance</p>
        </div>
    </section>

</body>
</html>
